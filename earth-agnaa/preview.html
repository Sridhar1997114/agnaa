<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth.Agnaa.in | Preview</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #1C1C72;
            --brand-violet: #7B2DBF;
            --brand-dark: #0D0D14;
            --brand-card: #14141F;
            --brand-light: #F0F0F6;
            --brand-muted: #8888AA;
        }

        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--brand-dark);
            font-family: 'Inter', sans-serif;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }

        .header {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(20, 20, 31, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.8rem 1.8rem;
            border-radius: 100px;
            border: 1px solid rgba(123, 45, 191, 0.3);
            width: fit-content;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo-placeholder {
            width: 32px;
            height: 32px;
            background: var(--brand-gradient, linear-gradient(135deg, #7B2DBF, #1C1C72));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }

        h1 {
            color: var(--brand-light);
            margin: 0;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .brand-text {
            color: var(--brand-violet);
            font-weight: 600;
        }

        .controls {
            pointer-events: auto;
            align-self: flex-end;
        }

        button {
            background: var(--brand-navy);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem 1.6rem;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: var(--brand-violet);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(123, 45, 191, 0.4);
        }

        /* Hide Cesium stuff */
        .cesium-viewer-bottom { display: none !important; }
        .cesium-viewer-toolbar { top: 100px !important; right: 2rem !important; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="overlay">
        <div class="header">
            <div class="logo-placeholder">A</div>
            <h1>Earth.<span class="brand-text">Agnaa</span></h1>
        </div>
        <div class="controls">
            <button id="resetView">Reset View</button>
        </div>
    </div>
    <script>
        // Use default Ion token for preview
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: undefined,
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            baseLayerPicker: true,
            sceneModePicker: true
        });

        viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#0D0D14');
        viewer.scene.globe.showGroundAtmosphere = true;
        
        // India center
        const initialView = {
            destination: Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 20000000.0),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-90),
                roll: 0
            }
        };
        
        viewer.camera.setView(initialView);

        document.getElementById('resetView').onclick = () => {
            viewer.camera.flyTo({
                ...initialView,
                duration: 3
            });
        };
    </script>
</body>
</html>
