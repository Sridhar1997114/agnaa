<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map.Agnaa.in | Interactive Globe</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #1C1C72;
            --brand-violet: #7B2DBF;
            --brand-light: #F0F0F6;
            --bg-deep: #020210;
        }

        html, body, #cesiumContainer {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
        }

        /* ── TOP HEADER ── */
        #overlay {
            position: absolute;
            top: 1.5rem; left: 1.5rem;
            pointer-events: none;
            z-index: 100;
        }
        .header {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(2, 2, 16, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.5rem 1rem 0.5rem 0.65rem;
            border-radius: 12px;
            border: 1px solid rgba(123, 45, 191, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .logo-wrap { width: 36px; height: 36px; flex-shrink: 0; }
        .logo-wrap svg { width: 100%; height: 100%; }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--brand-light);
            margin: 0; font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.4px;
        }
        .brand-text { color: var(--brand-violet); font-weight: 600; }

        /* ── SEARCH BAR ── */
        #searchBox {
            position: absolute;
            top: 1.5rem; left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(2, 2, 16, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.4rem 0.6rem 0.4rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(123, 45, 191, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: calc(100% - 3rem);
            max-width: 600px;
        }
        #searchBox:focus-within {
            border-color: rgba(123, 45, 191, 0.8);
            box-shadow: 0 8px 32px rgba(123, 45, 191, 0.2);
            max-width: 640px;
        }
        #coordInput {
            background: transparent;
            border: none;
            color: var(--brand-light);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            flex: 1;
            min-width: 100px;
            outline: none;
            padding: 4px 0;
        }
        #coordInput::placeholder { color: rgba(240,240,246,0.3); }

        .mode-toggle {
            font-size: 10px;
            font-weight: 700;
            color: rgba(240,240,246,0.5);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-right: 4px;
            white-space: nowrap;
        }
        .mode-toggle.active {
            color: #fff;
            background: rgba(123, 45, 191, 0.3);
            border-color: var(--brand-violet);
        }
        
        .search-actions { display: flex; gap: 4px; align-items: center; }
        
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--brand-light);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(123, 45, 191, 0.2); border-color: var(--brand-violet); }
        .icon-btn svg { width: 16px; height: 16px; }

        #searchBox .go-btn {
            background: linear-gradient(135deg, var(--brand-navy), var(--brand-violet));
            border: none;
            color: #fff;
            padding: 0 16px;
            height: 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        #searchBox .go-btn:hover { opacity: 0.85; transform: scale(1.02); }

        /* ── HIDE CESIUM UI ── */
        .cesium-viewer-toolbar,
        .cesium-viewer-bottom,
        .cesium-widget-credits,
        .cesium-performanceDisplay-defaultContainer { display: none !important; }

        /* ── COORD POPUP ── */
        #coordPopup {
            display: none;
            position: absolute;
            z-index: 300;
            background: rgba(2, 2, 16, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(123, 45, 191, 0.45);
            border-radius: 11px;
            padding: 12px 16px;
            color: var(--brand-light);
            font-size: 13px;
            pointer-events: auto;
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.7);
            min-width: 195px;
            user-select: text;
        }
        .coord-label {
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            color: rgba(179, 126, 237, 0.85);
            margin-bottom: 3px;
        }
        .coord-value {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }
        #gmapsLink, #copyCoordsBtn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 6px;
            padding: 6px 12px;
            border-radius: 7px;
            background: linear-gradient(135deg, var(--brand-navy), var(--brand-violet));
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.15s;
            cursor: pointer;
            border: none;
        }
        #copyCoordsBtn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            margin-left: 5px;
        }
        #gmapsLink:hover, #copyCoordsBtn:hover { opacity: 0.85; transform: scale(1.03); }
        #gmapsLink:hover { opacity: 0.85; transform: scale(1.03); }

        /* ── COLOR PANEL ── */
        #colorBtn {
            position: absolute;
            bottom: 1.5rem; right: 1.5rem;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            background: rgba(2, 2, 16, 0.78);
            border: 1px solid rgba(123, 45, 191, 0.4);
            border-radius: 10px;
            backdrop-filter: blur(16px);
            color: var(--brand-light);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: border-color 0.2s, background 0.2s;
        }
        #colorBtn:hover { border-color: var(--brand-violet); background: rgba(28,28,114,0.5); }
        #colorBtn svg { width: 16px; height: 16px; }

        #colorPanel {
            display: none;
            position: absolute;
            bottom: 4.5rem; right: 1.5rem;
            z-index: 200;
            background: rgba(2, 2, 16, 0.92);
            border: 1px solid rgba(123, 45, 191, 0.4);
            border-radius: 14px;
            padding: 18px 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.65);
            min-width: 260px;
            color: var(--brand-light);
            font-size: 13px;
        }
        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(179,126,237,0.85);
            margin-bottom: 14px;
        }
        .preset-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .preset-btn {
            flex: 1;
            padding: 7px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            text-align: center;
        }
        .preset-btn:hover, .preset-btn.active {
            border-color: var(--brand-violet);
            background: rgba(123, 45, 191, 0.22);
        }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }
        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .color-row label { font-size: 12px; color: rgba(240,240,246,0.8); }
        .color-row input[type="color"] {
            width: 36px; height: 28px;
            border: 1px solid rgba(123,45,191,0.4);
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }
        .apply-btn {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--brand-navy), var(--brand-violet));
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s;
        }
        .apply-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <!-- HEADER -->
    <div id="overlay">
        <div class="header">
            <div class="logo-wrap">
                <!-- Agnaa SVG Logo -->
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 4000">
                    <style>.st0{fill:#7B2DBF;fill-rule:evenodd;}</style>
                    <path class="st0" d="M104.5,3397.1 L104.5,1340.9 L703.1,1108.1 L703.1,3397.1 L503.5,3397.1 L503.5,2200 L304,2200 L304,3397.1 Z M304,2000.4 L503.5,2000.4 L503.5,1399.8 L304,1477.3 Z"/>
                    <path class="st0" d="M902.6,3197.6 L902.6,3397.1 L1501.1,3397.1 L1501.1,797.7 L902.6,1030.5 L902.6,2200 L1301.6,2200 L1301.6,3197.6 Z M1102.1,1167 L1301.6,1089.4 L1301.6,2000.4 L1102.1,2000.4 Z"/>
                    <polygon class="st0" points="1700.7,3397.1 1900.2,3397.1 1900.2,856.7 1999.9,817.8 2099.7,856.7 2099.7,3397.1 2299.2,3397.1 2299.2,720.1 1999.9,603.8 1700.7,720.1"/>
                    <path class="st0" d="M2498.9,1011.8 L2897.9,1167 L2897.9,2000.4 L2498.9,2000.4 L2498.9,3397.1 L3097.4,3397.1 L3097.4,1030.5 L2498.9,797.7 Z M2698.4,2200 L2897.9,2200 L2897.9,3197.6 L2698.4,3197.6 Z"/>
                    <path class="st0" d="M3296.9,1108.1 L3895.5,1340.9 L3895.5,3397.1 L3696,3397.1 L3696,2200 L3496.5,2200 L3496.5,3397.1 L3296.9,3397.1 Z M3496.5,1399.8 L3696,1477.3 L3696,2000.4 L3496.5,2000.4 Z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div id="searchBox">
        <button class="icon-btn" onclick="resetView()" title="Home View">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button id="modeToggle" class="mode-toggle active" onclick="toggleSearchMode()" title="Switch Search Mode">Address</button>
        <input type="text" id="coordInput" placeholder="Enter detailed address..." onkeydown="if(event.key==='Enter') flyToCoords()">
        <div class="search-actions">
            <button class="icon-btn" onclick="locateUser()" title="My Location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
            </button>
            <button class="go-btn" onclick="flyToCoords()">GO</button>
        </div>
    </div>

    <!-- COORD POPUP -->
    <div id="coordPopup">
        <div class="coord-label">Latitude</div>
        <div class="coord-value" id="popupLat">—</div>
        <div class="coord-label">Longitude</div>
        <div class="coord-value" id="popupLng">—</div>
        <div style="display: flex; gap: 4px;">
            <a id="gmapsLink" href="#" target="_blank">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Maps
            </a>
            <button id="copyCoordsBtn" onclick="copyCoords()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
            </button>
        </div>
    </div>

    <!-- COLOR CUSTOMIZER -->
    <button id="colorBtn" onclick="togglePanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="11" cy="19.5" r="2.5"/>
            <path d="M4 4l16 16" stroke-opacity="0.3"/>
        </svg>
        Map Colors
    </button>

    <div id="colorPanel">
        <div class="panel-title">Map Color Theme</div>
        <div class="preset-row">
            <button class="preset-btn active" id="preset-earth" onclick="applyPreset('earth')">🌍 Earth</button>
            <button class="preset-btn" id="preset-agnaa" onclick="applyPreset('agnaa')">🔵 Agnaa</button>
            <button class="preset-btn" id="preset-night" onclick="applyPreset('night')">🌑 Night</button>
        </div>
        <hr class="divider">
        <div class="panel-title" style="margin-bottom:10px">Custom</div>
        <div class="color-row">
            <label>Land color</label>
            <input type="color" id="landColor" value="#2d6a4f">
        </div>
        <div class="color-row">
            <label>Ocean / Base color</label>
            <input type="color" id="oceanColor" value="#1a3a5c">
        </div>
        <button class="apply-btn" onclick="applyCustom()">Apply Custom Colors</button>
    </div>

    <script>
    if (typeof Cesium === 'undefined') {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh">CesiumJS failed to load.</h1>';
    } else {

        // ─── VIEWER ───────────────────────────────────────────
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false,
            imageryProvider: false,
            skyBox: false,
            skyAtmosphere: false,
            sun: false,
            moon: false,
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            fullscreenButton: false,
            contextOptions: { webgl: { preserveDrawingBuffer: true } }
        });

        // ─── MAP LAYER ────────────────────────────────────────
        // ─── MAP LAYER (Base: Inactive Areas) ─────────────────
        // Using Carto Dark Matter for a basic, moody global political outline
        const baseProvider = new Cesium.UrlTemplateImageryProvider({
            url: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            credit: '© CARTO, © OpenStreetMap contributors',
            maximumLevel: 19
        });
        const mapLayer = viewer.imageryLayers.addImageryProvider(baseProvider);

        // ─── SATELLITE LAYER (Active Area: India) ─────────────
        // High-res satellite imagery exclusively for India bounding box
        Cesium.createWorldImageryAsync().then(provider => {
            const satelliteLayer = viewer.imageryLayers.addImageryProvider(provider);
            satelliteLayer.rectangle = Cesium.Rectangle.fromDegrees(68.0, 6.0, 98.0, 36.0);
        }).catch(err => console.warn('Could not load satellite layer', err));

        // ─── SCENE BASE ───────────────────────────────────────
        viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#020210');
        viewer.scene.globe.showGroundAtmosphere = true;

        // ─── STARFIELD ────────────────────────────────────────
        const points = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
        points.add({
            position: Cesium.Cartesian3.fromDegrees(-40, 30, 200000000.0),
            color: Cesium.Color.WHITE,
            pixelSize: 20,
            outlineColor: Cesium.Color.WHITE.withAlpha(0.25),
            outlineWidth: 7
        });
        for (let i = 0; i < 1200; i++) {
            points.add({
                position: Cesium.Cartesian3.fromDegrees(
                    Math.random()*360-180, Math.random()*180-90, 250000000.0),
                color: Cesium.Color.WHITE.withAlpha(Math.random()*0.5+0.1),
                pixelSize: Math.random()*1.5+0.5,
                outlineWidth: 0
            });
        }

        // ─── CAMERA ───────────────────────────────────────────
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 18000000.0),
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
        });

        // ─── COLOR PRESETS ────────────────────────────────────
        const presets = {
            earth: {
                hue: 0.08,       // Keep natural earth tones
                saturation: 1.0,
                brightness: 0.95,
                contrast: 1.05,
                gamma: 1.0,
                baseColor: '#0d2b45'   // Deep natural ocean
            },
            agnaa: {
                hue: 2.4,        // Deep navy/violet shift
                saturation: 2.8,
                brightness: 0.85,
                contrast: 1.3,
                gamma: 1.0,
                baseColor: '#1C1C72'   // Brand navy ocean
            },
            night: {
                hue: 3.8,
                saturation: 0.3,
                brightness: 0.5,
                contrast: 1.2,
                gamma: 0.9,
                baseColor: '#010108'   // Nearly black ocean
            }
        };

        function applyPreset(name) {
            const p = presets[name];
            mapLayer.hue = p.hue;
            mapLayer.saturation = p.saturation;
            mapLayer.brightness = p.brightness;
            mapLayer.contrast = p.contrast;
            mapLayer.gamma = p.gamma;
            viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString(p.baseColor);
            // Update active button
            ['earth','agnaa','night'].forEach(id => {
                document.getElementById('preset-'+id).classList.toggle('active', id === name);
            });
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16)/255;
            const g = parseInt(hex.slice(3,5),16)/255;
            const b = parseInt(hex.slice(5,7),16)/255;
            return {r,g,b};
        }

        function applyCustom() {
            const ocean = document.getElementById('oceanColor').value;
            // Desaturate custom and adjust brightness
            mapLayer.hue = 0.0;
            mapLayer.saturation = 0.8;
            mapLayer.brightness = 0.9;
            mapLayer.contrast = 1.1;
            mapLayer.gamma = 1.0;
            viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString(ocean);
            ['earth','agnaa','night'].forEach(id =>
                document.getElementById('preset-'+id).classList.remove('active')
            );
        }

        // Apply Earth preset by default
        applyPreset('earth');

        // ─── NAVIGATION FUNCTIONS ───────────────────────────
        let searchMode = 'address'; // 'address' or 'coords'

        function toggleSearchMode() {
            const btn = document.getElementById('modeToggle');
            const input = document.getElementById('coordInput');
            if (searchMode === 'address') {
                searchMode = 'coords';
                btn.textContent = 'Coords';
                input.placeholder = 'Enter Lat, Lng (e.g. 17.3, 78.4)...';
            } else {
                searchMode = 'address';
                btn.textContent = 'Address';
                input.placeholder = 'Enter detailed address...';
            }
        }

        function resetView() {
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 18000000.0),
                duration: 2
            });
        }

        async function flyToCoords() {
            const val = document.getElementById('coordInput').value.trim();
            if (!val) return;

            // In Coords mode, we expect Lat, Lng
            if (searchMode === 'coords') {
                const parts = val.split(/[, ]+/).map(s => parseFloat(s));
                if(parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    let lat = parts[0];
                    let lng = parts[1];
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(lng, lat, 100000.0) 
                    });
                } else {
                    alert("Please enter valid coordinates: Latitude, Longitude");
                }
                return;
            }

            // In Address mode, use Nominatim
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    // For detailed addresses, we zoom closer (50km) than for cities (150km)
                    // If the display name is long/detailed, zoom closer
                    const zoomLevel = data[0].display_name.split(',').length > 3 ? 50000.0 : 150000.0;
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(lon, lat, zoomLevel)
                    });
                } else {
                    alert("Could not find address: " + val);
                }
            } catch (e) {
                console.error("Geocoding error:", e);
                alert("Search failed. Please check your connection.");
            }
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(
                            position.coords.longitude, 
                            position.coords.latitude, 
                            100000.0
                        )
                    });
                }, err => {
                    alert("Location access denied or unavailable.");
                });
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        function copyCoords() {
            const lat = document.getElementById('popupLat').textContent.replace('°', '');
            const lng = document.getElementById('popupLng').textContent.replace('°', '');
            const text = `${lat}, ${lng}`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyCoordsBtn');
                const oldContent = btn.innerHTML;
                btn.innerHTML = 'Copied!';
                setTimeout(() => { btn.innerHTML = oldContent; }, 2000);
            });
        }

        window.flyToCoords = flyToCoords;
        window.resetView = resetView;
        window.locateUser = locateUser;
        window.copyCoords = copyCoords;
        window.toggleSearchMode = toggleSearchMode;

        // ─── PANEL TOGGLE ─────────────────────────────────────
        function togglePanel() {
            const p = document.getElementById('colorPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        window.togglePanel = togglePanel;
        window.applyPreset = applyPreset;
        window.applyCustom = applyCustom;

        // Close panel on globe click
        viewer.canvas.addEventListener('click', () => {
            document.getElementById('colorPanel').style.display = 'none';
        });

        // ─── RIGHT-CLICK COORDS ───────────────────────────────
        const coordPopup = document.getElementById('coordPopup');
        const popupLat   = document.getElementById('popupLat');
        const popupLng   = document.getElementById('popupLng');
        const gmapsLink  = document.getElementById('gmapsLink');
        let hideTimer    = null;

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);
        handler.setInputAction(function(click) {
            const ray = viewer.camera.getPickRay(click.position);
            if (!ray) return;
            const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
            if (!cartesian) return;

            const carto = Cesium.Cartographic.fromCartesian(cartesian);
            const lat   = Cesium.Math.toDegrees(carto.latitude).toFixed(6);
            const lng   = Cesium.Math.toDegrees(carto.longitude).toFixed(6);

            popupLat.textContent = lat + '°';
            popupLng.textContent = lng + '°';
            gmapsLink.href = `https://maps.google.com/?q=${lat},${lng}`;

            // Position popup — keep inside viewport
            const vw = window.innerWidth, vh = window.innerHeight;
            let x = click.position.x + 18;
            let y = click.position.y - 45;
            if (x + 210 > vw) x = click.position.x - 225;
            if (y < 0) y = click.position.y + 10;
            coordPopup.style.left = x + 'px';
            coordPopup.style.top  = y + 'px';
            coordPopup.style.display = 'block';

            if (hideTimer) clearTimeout(hideTimer);
            hideTimer = setTimeout(() => { coordPopup.style.display = 'none'; }, 7000);
        }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

        // ─── AGNAA ACTIVE REGIONS ─────────────────────────────
        window.setAgnaaActiveRegions = async function(options) {
            const activeStates = options.states || [];
            const activeCities = options.cities || [];

            // 1. Highlight States via GeoJSON
            try {
                // Reliable public GeoJSON for Indian States
                const stateGeoJsonUrl = 'https://raw.githubusercontent.com/Subhash9325/GeoJson-Data-of-Indian-States/master/Indian_States';
                const dataSource = await Cesium.GeoJsonDataSource.load(stateGeoJsonUrl, {
                    stroke: Cesium.Color.fromCssColorString('#7b2dbf').withAlpha(0.8),
                    fill: Cesium.Color.fromCssColorString('#431e54').withAlpha(0.15),
                    strokeWidth: 3,
                    markerSymbol: '?'
                });
                
                const entities = dataSource.entities.values;
                for (let i = entities.length - 1; i >= 0; i--) {
                    const entity = entities[i];
                    const stateName = entity.properties.st_nm ? entity.properties.st_nm.getValue() : 
                                     (entity.properties.NAME_1 ? entity.properties.NAME_1.getValue() : '');
                    
                    let isActive = false;
                    for (let j = 0; j < activeStates.length; j++) {
                        if (stateName.toLowerCase().includes(activeStates[j].toLowerCase())) {
                            isActive = true; break;
                        }
                    }
                    
                    if (!isActive) {
                        dataSource.entities.remove(entity);
                    } else if (entity.polygon) {
                        // Subtle 3D extrusion and glowing outline for active states
                        entity.polygon.extrudedHeight = 15000; // 15km high
                        entity.polygon.outline = true;
                        entity.polygon.outlineColor = Cesium.Color.fromCssColorString('#b37eed');
                    }
                }
                viewer.dataSources.add(dataSource);
            } catch (err) {
                console.warn('Could not load states GeoJSON', err);
            }

            // 2. Add City Markers (Glowing Pillars)
            activeCities.forEach(city => {
                viewer.entities.add({
                    name: city.name,
                    position: Cesium.Cartesian3.fromDegrees(city.lng, city.lat, 25000),
                    cylinder: {
                        length: 50000.0,
                        topRadius: 8000.0,
                        bottomRadius: 8000.0,
                        material: new Cesium.ColorMaterialProperty(
                            Cesium.Color.fromCssColorString('#b37eed').withAlpha(0.6)
                        ),
                        outline: true,
                        outlineColor: Cesium.Color.fromCssColorString('#ffffff').withAlpha(0.8),
                    },
                    label: {
                        text: city.name,
                        font: '14pt Inter, sans-serif',
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -40),
                        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 5000000)
                    }
                });
            });
        };

        // Initialize default active regions
        setTimeout(() => {
            window.setAgnaaActiveRegions({
                states: ['Delhi', 'Bihar', 'Telangana', 'Andhra Pradesh', 'Tamil Nadu', 'Maharashtra'],
                cities: [
                    {name: 'New Delhi', lat: 28.6139, lng: 77.2090},
                    {name: 'Patna', lat: 25.5941, lng: 85.1376},
                    {name: 'Hyderabad', lat: 17.3850, lng: 78.4867},
                    {name: 'Amaravati', lat: 16.5131, lng: 80.5165},
                    {name: 'Chennai', lat: 13.0827, lng: 80.2707},
                    {name: 'Mumbai', lat: 19.0760, lng: 72.8777}
                ]
            });
        }, 1500);

        console.log('✅ Map.Agnaa initialized');
    }
    </script>
</body>
