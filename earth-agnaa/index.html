<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map.Agnaa.in | Interactive Globe</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #1C1C72;
            --brand-violet: #7B2DBF;
            --brand-light: #F0F0F6;
            --bg-deep: #020210;
        }

        html, body, #cesiumContainer {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Inter', sans-serif;
        }

        /* ── TOP HEADER ── */
        #overlay {
            position: absolute;
            top: 1.5rem; left: 1.5rem;
            pointer-events: none;
            z-index: 100;
        }
        .header {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(2, 2, 16, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.5rem 1rem 0.5rem 0.65rem;
            border-radius: 12px;
            border: 1px solid rgba(123, 45, 191, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .logo-wrap { width: 36px; height: 36px; flex-shrink: 0; }
        .logo-wrap svg { width: 100%; height: 100%; }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--brand-light);
            margin: 0; font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.4px;
        }
        .brand-text { color: var(--brand-violet); font-weight: 600; }

        /* ── HIDE CESIUM UI ── */
        .cesium-viewer-toolbar,
        .cesium-viewer-bottom,
        .cesium-widget-credits,
        .cesium-performanceDisplay-defaultContainer { display: none !important; }

        /* ── COORD POPUP ── */
        #coordPopup {
            display: none;
            position: absolute;
            z-index: 300;
            background: rgba(2, 2, 16, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(123, 45, 191, 0.45);
            border-radius: 11px;
            padding: 12px 16px;
            color: var(--brand-light);
            font-size: 13px;
            pointer-events: auto;
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.7);
            min-width: 195px;
            user-select: text;
        }
        .coord-label {
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            color: rgba(179, 126, 237, 0.85);
            margin-bottom: 3px;
        }
        .coord-value {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }
        #gmapsLink {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 6px;
            padding: 6px 12px;
            border-radius: 7px;
            background: linear-gradient(135deg, var(--brand-navy), var(--brand-violet));
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.15s;
            cursor: pointer;
        }
        #gmapsLink:hover { opacity: 0.85; transform: scale(1.03); }

        /* ── COLOR PANEL ── */
        #colorBtn {
            position: absolute;
            bottom: 1.5rem; right: 1.5rem;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            background: rgba(2, 2, 16, 0.78);
            border: 1px solid rgba(123, 45, 191, 0.4);
            border-radius: 10px;
            backdrop-filter: blur(16px);
            color: var(--brand-light);
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: border-color 0.2s, background 0.2s;
        }
        #colorBtn:hover { border-color: var(--brand-violet); background: rgba(28,28,114,0.5); }
        #colorBtn svg { width: 16px; height: 16px; }

        #colorPanel {
            display: none;
            position: absolute;
            bottom: 4.5rem; right: 1.5rem;
            z-index: 200;
            background: rgba(2, 2, 16, 0.92);
            border: 1px solid rgba(123, 45, 191, 0.4);
            border-radius: 14px;
            padding: 18px 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.65);
            min-width: 260px;
            color: var(--brand-light);
            font-size: 13px;
        }
        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(179,126,237,0.85);
            margin-bottom: 14px;
        }
        .preset-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .preset-btn {
            flex: 1;
            padding: 7px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            text-align: center;
        }
        .preset-btn:hover, .preset-btn.active {
            border-color: var(--brand-violet);
            background: rgba(123, 45, 191, 0.22);
        }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }
        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .color-row label { font-size: 12px; color: rgba(240,240,246,0.8); }
        .color-row input[type="color"] {
            width: 36px; height: 28px;
            border: 1px solid rgba(123,45,191,0.4);
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }
        .apply-btn {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--brand-navy), var(--brand-violet));
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s;
        }
        .apply-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <!-- HEADER -->
    <div id="overlay">
        <div class="header">
            <div class="logo-wrap">
                <!-- Agnaa SVG Logo -->
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 4000">
                    <style>.st0{fill:#7B2DBF;fill-rule:evenodd;}</style>
                    <path class="st0" d="M104.5,3397.1 L104.5,1340.9 L703.1,1108.1 L703.1,3397.1 L503.5,3397.1 L503.5,2200 L304,2200 L304,3397.1 Z M304,2000.4 L503.5,2000.4 L503.5,1399.8 L304,1477.3 Z"/>
                    <path class="st0" d="M902.6,3197.6 L902.6,3397.1 L1501.1,3397.1 L1501.1,797.7 L902.6,1030.5 L902.6,2200 L1301.6,2200 L1301.6,3197.6 Z M1102.1,1167 L1301.6,1089.4 L1301.6,2000.4 L1102.1,2000.4 Z"/>
                    <polygon class="st0" points="1700.7,3397.1 1900.2,3397.1 1900.2,856.7 1999.9,817.8 2099.7,856.7 2099.7,3397.1 2299.2,3397.1 2299.2,720.1 1999.9,603.8 1700.7,720.1"/>
                    <path class="st0" d="M2498.9,1011.8 L2897.9,1167 L2897.9,2000.4 L2498.9,2000.4 L2498.9,3397.1 L3097.4,3397.1 L3097.4,1030.5 L2498.9,797.7 Z M2698.4,2200 L2897.9,2200 L2897.9,3197.6 L2698.4,3197.6 Z"/>
                    <path class="st0" d="M3296.9,1108.1 L3895.5,1340.9 L3895.5,3397.1 L3696,3397.1 L3696,2200 L3496.5,2200 L3496.5,3397.1 L3296.9,3397.1 Z M3496.5,1399.8 L3696,1477.3 L3696,2000.4 L3496.5,2000.4 Z"/>
                </svg>
            </div>
            <h1>Map.<span class="brand-text">Agnaa</span></h1>
        </div>
    </div>

    <!-- COORD POPUP -->
    <div id="coordPopup">
        <div class="coord-label">Latitude</div>
        <div class="coord-value" id="popupLat">—</div>
        <div class="coord-label">Longitude</div>
        <div class="coord-value" id="popupLng">—</div>
        <a id="gmapsLink" href="#" target="_blank">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in Google Maps
        </a>
    </div>

    <!-- COLOR CUSTOMIZER -->
    <button id="colorBtn" onclick="togglePanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="11" cy="19.5" r="2.5"/>
            <path d="M4 4l16 16" stroke-opacity="0.3"/>
        </svg>
        Map Colors
    </button>

    <div id="colorPanel">
        <div class="panel-title">Map Color Theme</div>
        <div class="preset-row">
            <button class="preset-btn active" id="preset-earth" onclick="applyPreset('earth')">🌍 Earth</button>
            <button class="preset-btn" id="preset-agnaa" onclick="applyPreset('agnaa')">🔵 Agnaa</button>
            <button class="preset-btn" id="preset-night" onclick="applyPreset('night')">🌑 Night</button>
        </div>
        <hr class="divider">
        <div class="panel-title" style="margin-bottom:10px">Custom</div>
        <div class="color-row">
            <label>Land color</label>
            <input type="color" id="landColor" value="#2d6a4f">
        </div>
        <div class="color-row">
            <label>Ocean / Base color</label>
            <input type="color" id="oceanColor" value="#1a3a5c">
        </div>
        <button class="apply-btn" onclick="applyCustom()">Apply Custom Colors</button>
    </div>

    <script>
    if (typeof Cesium === 'undefined') {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh">CesiumJS failed to load.</h1>';
    } else {

        // ─── VIEWER ───────────────────────────────────────────
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayerPicker: false,
            imageryProvider: false,
            skyBox: false,
            skyAtmosphere: false,
            sun: false,
            moon: false,
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            fullscreenButton: false,
            contextOptions: { webgl: { preserveDrawingBuffer: true } }
        });

        // ─── MAP LAYER ────────────────────────────────────────
        // Using OpenStreetMap – guaranteed to work; we color-shift it
        const osmProvider = new Cesium.OpenStreetMapImageryProvider({
            url: 'https://tile.openstreetmap.org/'
        });
        const mapLayer = viewer.imageryLayers.addImageryProvider(osmProvider);

        // ─── SCENE BASE ───────────────────────────────────────
        viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#020210');
        viewer.scene.globe.showGroundAtmosphere = true;

        // ─── STARFIELD ────────────────────────────────────────
        const points = viewer.scene.primitives.add(new Cesium.PointPrimitiveCollection());
        points.add({
            position: Cesium.Cartesian3.fromDegrees(-40, 30, 200000000.0),
            color: Cesium.Color.WHITE,
            pixelSize: 20,
            outlineColor: Cesium.Color.WHITE.withAlpha(0.25),
            outlineWidth: 7
        });
        for (let i = 0; i < 1200; i++) {
            points.add({
                position: Cesium.Cartesian3.fromDegrees(
                    Math.random()*360-180, Math.random()*180-90, 250000000.0),
                color: Cesium.Color.WHITE.withAlpha(Math.random()*0.5+0.1),
                pixelSize: Math.random()*1.5+0.5,
                outlineWidth: 0
            });
        }

        // ─── CAMERA ───────────────────────────────────────────
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 18000000.0),
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
        });

        // ─── COLOR PRESETS ────────────────────────────────────
        const presets = {
            earth: {
                hue: 0.08,       // Keep natural earth tones
                saturation: 1.0,
                brightness: 0.95,
                contrast: 1.05,
                gamma: 1.0,
                baseColor: '#0d2b45'   // Deep natural ocean
            },
            agnaa: {
                hue: 2.4,        // Deep navy/violet shift
                saturation: 2.8,
                brightness: 0.85,
                contrast: 1.3,
                gamma: 1.0,
                baseColor: '#1C1C72'   // Brand navy ocean
            },
            night: {
                hue: 3.8,
                saturation: 0.3,
                brightness: 0.5,
                contrast: 1.2,
                gamma: 0.9,
                baseColor: '#010108'   // Nearly black ocean
            }
        };

        function applyPreset(name) {
            const p = presets[name];
            mapLayer.hue = p.hue;
            mapLayer.saturation = p.saturation;
            mapLayer.brightness = p.brightness;
            mapLayer.contrast = p.contrast;
            mapLayer.gamma = p.gamma;
            viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString(p.baseColor);
            // Update active button
            ['earth','agnaa','night'].forEach(id => {
                document.getElementById('preset-'+id).classList.toggle('active', id === name);
            });
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16)/255;
            const g = parseInt(hex.slice(3,5),16)/255;
            const b = parseInt(hex.slice(5,7),16)/255;
            return {r,g,b};
        }

        function applyCustom() {
            const ocean = document.getElementById('oceanColor').value;
            // Desaturate custom and adjust brightness
            mapLayer.hue = 0.0;
            mapLayer.saturation = 0.8;
            mapLayer.brightness = 0.9;
            mapLayer.contrast = 1.1;
            mapLayer.gamma = 1.0;
            viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString(ocean);
            ['earth','agnaa','night'].forEach(id =>
                document.getElementById('preset-'+id).classList.remove('active')
            );
        }

        // Apply Earth preset by default
        applyPreset('earth');

        // ─── PANEL TOGGLE ─────────────────────────────────────
        function togglePanel() {
            const p = document.getElementById('colorPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        window.togglePanel = togglePanel;
        window.applyPreset = applyPreset;
        window.applyCustom = applyCustom;

        // Close panel on globe click
        viewer.canvas.addEventListener('click', () => {
            document.getElementById('colorPanel').style.display = 'none';
        });

        // ─── RIGHT-CLICK COORDS ───────────────────────────────
        const coordPopup = document.getElementById('coordPopup');
        const popupLat   = document.getElementById('popupLat');
        const popupLng   = document.getElementById('popupLng');
        const gmapsLink  = document.getElementById('gmapsLink');
        let hideTimer    = null;

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);
        handler.setInputAction(function(click) {
            const ray = viewer.camera.getPickRay(click.position);
            if (!ray) return;
            const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
            if (!cartesian) return;

            const carto = Cesium.Cartographic.fromCartesian(cartesian);
            const lat   = Cesium.Math.toDegrees(carto.latitude).toFixed(6);
            const lng   = Cesium.Math.toDegrees(carto.longitude).toFixed(6);

            popupLat.textContent = lat + '°';
            popupLng.textContent = lng + '°';
            gmapsLink.href = `https://maps.google.com/?q=${lat},${lng}`;

            // Position popup — keep inside viewport
            const vw = window.innerWidth, vh = window.innerHeight;
            let x = click.position.x + 18;
            let y = click.position.y - 45;
            if (x + 210 > vw) x = click.position.x - 225;
            if (y < 0) y = click.position.y + 10;
            coordPopup.style.left = x + 'px';
            coordPopup.style.top  = y + 'px';
            coordPopup.style.display = 'block';

            if (hideTimer) clearTimeout(hideTimer);
            hideTimer = setTimeout(() => { coordPopup.style.display = 'none'; }, 7000);
        }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

        console.log('✅ Map.Agnaa initialized');
    }
    </script>
</body>
</html>
